name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: research-cockpit/package-lock.json
      - run: npm ci
        working-directory: research-cockpit
      - run: npm run build
        working-directory: research-cockpit
      - uses: actions/upload-pages-artifact@v3
        with:
          path: research-cockpit/dist
      - id: deployment
        uses: actions/deploy-pages@v4
